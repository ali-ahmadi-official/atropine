{% extends 'bases/chat.html' %}

{% load static %}

{% block title %}
گفتگو
{% endblock %}

{% block header %}
<header class="chatting-header prfile-header">
    <div class="custom-container">
        <div class="header-box">
            <a href="{% url 'chat_list' %}" class="arrow-box title-color">
                <i class="ri-arrow-right-s-line"></i>
            </a>
            <a href="user-profile.html" class="header-profile">
                <div class="profile-image">
                    <img src="{% static 'images/chatting/profile/1.jpg' %}" class="img-fluid" alt="">
                </div>
                <div class="name-content">
                    <h5>مایکل اندرسون</h5>
                    <h6>مدرس شیمی</h6>
                </div>
            </a>
        </div>
    </div>
</header>
{% endblock %}

{% block content %}
<!-- Messaging Box Section Start -->
<div class="message-box">
    <div class="custom-container">
        <div class="msger">
            <div class="msger-chat">
                <div class="msg left-msg">
                    <div class="msg-bubble">
                        <div class="msg-info">
                            <div class="msg-info-time">12:45</div>
                        </div>

                        <div class="msg-text">
                            سلام، به آتروپین خوش آمدید! برو و به من پیام بده 😄
                        </div>
                    </div>
                </div>

                <div class="msg right-msg">
                    <div class="msg-bubble">
                        <div class="msg-info">
                            <div class="msg-info-time">12:46</div>
                        </div>

                        <div class="msg-text">سلام بسیار خوشحالم!</div>
                    </div>
                </div>
            </div>

            <form class="msger-inputarea">
                <div class="position-relative p-0">
                    <input type="text" class="msger-input" placeholder="پیام خود را وارد نمایید...">
                    <button type="submit" class="msger-send-btn">
                        <svg>
                            <g clip-path="url(#clip0_226_768)">
                                <path d="M18.3334 1.66669L9.16675 10.8334" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" />
                                <path d="M18.3334 1.66669L12.5001 18.3334L9.16675 10.8334L1.66675 7.50002L18.3334 1.66669Z" stroke-width="1.5"
                                    stroke-linecap="round" stroke-linejoin="round" />
                            </g>
                            <defs>
                                <clipPath id="clip0_226_768">
                                    <rect width="20" height="20" />
                                </clipPath>
                            </defs>
                        </svg>
                    </button>
                    <button class="btn emoji-button">
                        <svg class="emoji-icon">
                            <path
                            d="M12 22C17.5228 22 22 17.5228 22 12C22 6.47715 17.5228 2 12 2C6.47715 2 2 6.47715 2 12C2 17.5228 6.47715 22 12 22Z"
                            stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M8 14C8 14 9.50009 16.3636 12.0001 16.3636C14.5001 16.3636 16 14 16 14" stroke-width="1.2"
                            stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M9 9H9.00985" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
                        <path d="M15 9H15.0098" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" />
                        </svg>
                    </button>
                </div>
            </form>
        </div>
    </div>
</div>
<!-- Messaging Box Section End -->
{% endblock %}
