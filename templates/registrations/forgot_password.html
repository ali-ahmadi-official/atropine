{% load static %}

<!DOCTYPE html>
<html lang="en" dir="rtl">

<head>
    <meta http-equiv="Content-Type" content="text/html; charset=UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="آتروپین">
    <meta name="keywords" content="آتروپین">
    <title>فراموشی رمز عبور</title>
    <link rel="manifest" href="{% static 'jsons/manifest.json' %}">
    <meta name="theme-color" content="#172561">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="آتروپین">
    <meta name="msapplication-TileImage" content="{% static 'images/logo.jpg' %}">
    <meta name="msapplication-TileColor" content="#FFFFFF">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <link rel="icon" type="image/x-icon" href="{% static 'images/logo-optimized.jpg' %}">

    <!--Google font-->
    <link rel="preconnect" href="https://fonts.googleapis.com/">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100;200;300;400;500;600;700;800;900&amp;display=swap"
        rel="stylesheet">

    <!-- Bootstrap css -->
    <link id="rtl-link" rel="stylesheet" type="text/css" href="{% static 'css/vendors/bootstrap.css' %}">

    <!-- Remix Icon css -->
    <link rel="stylesheet" type="text/css" href="{% static 'css/remixicon.css' %}">

    <!-- Style css -->
    <link id="change-link" rel="stylesheet" type="text/css" href="{% static 'css/style.css' %}">
</head>

<body class="inter-body learning-color">

    <!-- Log In Form Start -->
    <section class="learning-auth">
        <div class="learning-header px-15">
            <div class="home-contain">
                <h2>رمز عبور را فراموش کرده اید؟</h2>
                <h5>لطفا آدرس مرتبط با حساب خود را وارد کنید.</h5>
            </div>
        </div>
        <div class="custom-container">
            <div class="row">
                <div class="col-12">
                    <form class="form-style-1 mt-35">
                        <div class="mb-4">
                            <label for="email" class="form-label">ایمیل</label>
                            <input type="email" class="form-control" placeholder="آدرس ایمیل خود را وارد کنید" id="email">
                        </div>
                        <a href="{% url 'otp' %}" class="btn btn-gradient">ثبت</a>
                    </form>
                </div>
            </div>
        </div>
    </section>
    <!-- Log In Form End -->

    <!-- Theme Option Setting Box Start -->
    <div class="theme-setting-box">
        <div class="theme-box">
            <button class="theme-icon text-white">
                <i class="ri-pencil-line"></i>
            </button>
            <ul class="theme-option">
                <li>
                    <button class="theme-setting-button" id="light-btn">
                        <i class="ri-sun-line"></i>
                    </button>
                </li>
                <li>
                    <button class="theme-setting-button" id="dark-btn">
                        <i class="ri-moon-line"></i>
                    </button>
                </li>
                <li>
                    <button class="theme-setting-button" id="system-btn">
                        <i class="ri-computer-line"></i>
                    </button>
                </li>
            </ul>
        </div>
    </div>
    <!-- Theme Option Setting Box End -->

    <!-- Bootstrap js-->
    <script src="{% static 'js/vendors/bootstrap/bootstrap.bundle.min.js' %}"></script>

    <!-- Theme js-->
    <script src="{% static 'js/script.js' %}"></script>

    <!-- Theme Settings js-->
    <script src="{% static 'js/theme-setting.js' %}"></script>
</body>


</html>
