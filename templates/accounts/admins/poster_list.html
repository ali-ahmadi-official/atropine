{% extends 'bases/dashboard.html' %}

{% load static %}

{% block title %}
لیست پوستر ها
{% endblock %}

{% block content %}
<div class="table-responsive" dir="rtl">
    <div class="card-header justify-content-between">
        <div class="card-title">
            <h4>
                لیست پوستر ها
                <a href="{% url 'poster_add' %}">
                    <span class="btn btn-success-transparent">افزودن</span>
                </a>
            </h4>
        </div>
    </div>
    <table class="table text-nowrap table-hover">
        <thead>
            <tr>
                <th scope="col">شناسه</th>
                <th scope="col">کاور</th>
                <th scope="col">عملیات</th>
            </tr>
        </thead>
        <tbody>
            {% for poster in posters %}
            <tr>
                <td>
                    {{ poster.id }}
                </td>
                <td>
                    <div class="avatar avatar-sm me-۲ avatar-rounded">
                        {% if poster.cover %}
                        <img src="{{ poster.cover.url }}" alt="profile">
                        {% endif %}
                    </div>
                </td>
                <td>
                    <a href="{% url 'poster_delete' poster.id %}" class="btn btn-icon btn-sm btn-danger-transparent rounded-pill">
                        <i class="ri-delete-bin-line"></i>
                    </a>
                </td>
            </tr>
            {% empty %}
            <tr>
                <td colspan="3" style="text-align: center;">
                    موردی یافت نشد.
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</div>
{% endblock %}
