{% extends 'bases/accounts.html' %}

{% load static %}

{% block title %}
تکمیل اطلاعات
{% endblock %}

{% block form %}
<form class="form-style-1 mt-35" method="post">
    {% csrf_token %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} color-white">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    <div class="mb-4">
        <label for="first_name" class="form-label">نام</label>
        <input type="text" name="first_name" class="form-control" id="first_name" required>
    </div>
    <div class="mb-4">
        <label for="last_name" class="form-label">نام خانوادگی</label>
        <input type="text" name="last_name" class="form-control" id="last_name" required>
    </div>
    <button class="btn btn-danger mt-4">ثبت</button>
</form>
{% endblock %}
