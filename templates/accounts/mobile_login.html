{% extends 'bases/accounts.html' %}

{% load static %}

{% block title %}
ورود
{% endblock %}

{% block form %}
<form class="form-style-1 mt-35" method="post">
    {% csrf_token %}

    {% if messages %}
    {% for message in messages %}
    <div class="alert alert-{{ message.tags }} color-white">
        {{ message }}
    </div>
    {% endfor %}
    {% endif %}

    <div class="mb-4">
        <label for="mobile" class="form-label">شماره موبایل</label>
        <input type="text" name="mobile" id="mobile" class="form-control" placeholder="شماره موبایل خود را وارد کنید"
            required autofocus>
    </div>

    <button class="btn btn-danger mt-4">
        ادامه
    </button>

    <div class="continue-media">
        <span>دریافت اشتراک مشاوره از طریق پشتیبانی</span>
    </div>

    <div class="mt-3" style="display:flex;justify-content:center;align-items:center;gap:10px">

        <a target="_blank" href="">
            <img src="{% static 'images/telegram.jpg' %}" alt="telegram" width="40">
        </a>

        <a target="_blank" href="">
            <img src="{% static 'images/bale.jpg' %}" alt="bale" width="40">
        </a>

    </div>

</form>
{% endblock %}
