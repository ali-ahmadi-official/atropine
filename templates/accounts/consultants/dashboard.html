{% extends 'bases/dashboard.html' %}
{% load static %}

{% block title %}
داشبورد
{% endblock %}

{% block content %}

<div class="container my-4" dir="rtl">

    <div class="card shadow-sm border-0">
        <div class="card-body">

            <h5 class="fw-bold text-center mb-4">
                🚀 دسترسی سریع
            </h5>

            <div class="row g-3">

                {% if not request.user.user_consultant %}
                <div class="col-lg-3 col-md-4 col-6">
                    <a href="{% url 'consultant_add' %}" class="btn btn-info-transparent w-100 py-3">
                        <i class="bi bi-person-plus-fill d-block fs-3 mb-2"></i>
                        ساخت پروفایل
                    </a>
                </div>
                {% else %}
                <div class="col-lg-3 col-md-4 col-6">
                    <a href="{% url 'consultant_edit' request.user.user_consultant.id %}"
                        class="btn btn-info-transparent w-100 py-3">
                        <i class="bi bi-person-gear d-block fs-3 mb-2"></i>
                        ویرایش پروفایل
                    </a>
                </div>
                {% endif %}

                <!-- نوبت‌ها -->
                <div class="col-lg-3 col-md-4 col-6">
                    <a href="{% url 'schedule_list' %}" class="btn btn-success-transparent w-100 py-3">
                        <i class="bi bi-calendar-check-fill d-block fs-3 mb-2"></i>
                        نوبت‌های من
                    </a>
                </div>

            </div>

        </div>
    </div>

</div>

{% endblock %}
