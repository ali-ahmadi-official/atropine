{% extends 'bases/dashboard.html' %}

{% load static %}

{% block title %}
ادیت پروفایل
{% endblock %}

{% block content %}
<div class="row gy-۴" dir="rtl">
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% for field in form %}
        <div class="col-xl-6 col-lg-6 col-md-6 col-sm-12 w-100">
            <p class="mt-2 text-muted">{{ field.label }}</p>
            {% include 'includes/error.html' with errors=field.errors %}
            {{ field }}
        </div>
        {% endfor %}
        <button type="submit" class="btn btn-success w-100 my-3">ثبت</button>
    </form>
</div>
{% endblock %}
