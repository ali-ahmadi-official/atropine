{% extends 'bases/accounts.html' %}

{% load static %}

{% block title %}
ورود با کد تایید
{% endblock %}

{% block form %}
<form class="form-style-1 mt-35" method="post">
    {% csrf_token %}
    {% if messages %}
        {% for message in messages %}
            <div class="alert alert-{{ message.tags }} color-white">
                {{ message }}
            </div>
        {% endfor %}
    {% endif %}
    <div class="mb-4">
        <label for="mobile" class="form-label">شماره موبایل</label>
        <input type="text" name="mobile" class="form-control" placeholder="شماره موبایل خود را وارد کنید" id="mobile" required>
    </div>
    <button class="btn btn-danger mt-4">ورود</button>
    <div class="continue-media">
        <span>دریافت اشتراک مشاوره از طریق پشتیبانی</span>
    </div>
    <div class="social-style-1">
        <a target="_blank" class="btn"
            href="https://accounts.google.com/signin/v2/challenge/pwd?rart=ANgoxcdbbNxH1nYXChBQ7n_DhSet9sRm1XXzUFTdrodQQJThJv3oPCktvjFuZq-YDK8WsXHW_gXYeU7G-XB1iBPG0qMJAeBgcA&amp;TL=ADFpJfNO0RX76w3_dSTgZpAaaAo5b4pVS_QbxZE9ZcTWHKvMhtzT8sU5qddOsm_4&amp;flowName=GlifWebSignIn&amp;cid=1&amp;flowEntry=ServiceLogin">
            <img src="{% static 'images/telegram.jpg' %}" alt="telegram">
            <span>Telegram</span>
        </a>
        <a href="https://appleid.apple.com/" class="btn" target="_blank">
            <img src="{% static 'images/bale.jpg' %}" alt="bale">
            <span>Bale</span>
        </a>
    </div>
</form>
{% endblock %}
